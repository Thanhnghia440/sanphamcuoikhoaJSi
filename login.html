<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Student Manager</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Trang chủ</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Học sinh</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Điểm</a>
        </li>
      </ul>

      <div>
        <button class="btn btn-success me-2" onclick="window.location.href='login.html'">Đăng nhập</button>
        <button class="btn btn-danger" onclick="window.location.href='register.html'">Đăng ký</button>
      </div>
    </div>
  </div>
</nav>

<!-- FORM -->
<div class="d-flex justify-content-center align-items-center" style="height:80vh;">
  <div class="card p-4 shadow" style="width:350px;">
    <h3 class="text-center">Đăng nhập</h3>

    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};

// Bắt submit form đăng nhập
const form = document.querySelector("form");

form.addEventListener("submit", function (e) { 
  e.preventDefault(); // Ngăn chặn submit mặc định

  // account có thể là username hoặc email
  const account = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  // Lấy danh sách user
  const users = JSON.parse(localStorage.getItem("users")) || [];

  // Kiểm tra đăng nhập
  const user = users.find(
    (u) =>
      (u.username === account || u.email === account) && u.password === password
  );

  if (!user) {
    alert("Sai tài khoản hoặc mật khẩu");
    return;
  }

  // Lưu user đang đăng nhập
  localStorage.setItem("currentUser", JSON.stringify(user));
  alert("Đăng nhập thành công!");
  window.location.href = "index.html";
});
</script>

</body>
</html>
