<div class="container mt-5">

    <h4 class="mb-3">Đăng nhập giáo viên</h4>

    <input id="username" class="form-control mb-3" placeholder="Tên đăng nhập">
    <input id="password" type="password" class="form-control mb-3" placeholder="Mật khẩu">

    <button class="btn btn-primary w-100" onclick="login()">Đăng nhập</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// global
window.db = db;
window.fb = { collection, getDocs, addDoc };
window.login = async function () {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(
    (u) => u.username === username && u.password === password
  );

  if (!user) {
    alert("Sai tài khoản hoặc mật khẩu!");
    return;
  }

  // ===== LƯU LOCAL =====
  localStorage.setItem("currentUser", JSON.stringify(user));

  // ===== LƯU FIREBASE =====
  const querySnapshot = await fb.getDocs(fb.collection(db, "users"));

  let exists = false;

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    if (data.username === user.username) {
      exists = true;
    }
  });

  if (!exists) {
    await fb.addDoc(fb.collection(db, "users"), {
      username: user.username,
      email: user.email || "",
      role: "teacher"
    });
  }

  alert("Đăng nhập thành công!");
  window.location.href = "index.html";
};

</script>
