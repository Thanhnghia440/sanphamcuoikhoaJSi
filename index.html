<script>
// Hiển thị tên giáo viên
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("currentUser"));
  
  if (user) {
    const navDiv = document.querySelector(".navbar .btn-success").parentElement;

    navDiv.innerHTML = `
      <span class="text-white me-3">👋 ${user.username}</span>
      <button class="btn btn-warning" onclick="logout()">Đăng xuất</button>
    `;
  }
};

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}
</script>
<!-- DASHBOARD -->
<div class="container mt-4">

  <h3 class="mb-4">📊 Dashboard</h3>

  <div class="row text-center">
    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Tổng học sinh</h5>
          <h2 id="total">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Học sinh giỏi</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Trung bình lớp</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>
  </div>

  <!-- DANH SÁCH HỌC SINH -->
  <div class="card mt-4 shadow">
    <div class="card-body">
      <div class="d-flex justify-content-between mb-3">
        <h5>Danh sách học sinh mới</h5>
        <button class="btn btn-primary" onclick="addStudent()">+ Thêm</button>
      </div>

      <table class="table table-bordered text-center">
        <thead class="table-dark">
          <tr>
            <th>Tên</th>
            <th>Lớp</th>
            <th>Email</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="studentList">
          <!-- JS thêm dữ liệu -->
        </tbody>
      </table>

<footer class="text-center mt-4 mb-2">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== KIỂM TRA LOGIN =====
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) {
  alert("Bạn cần đăng nhập tài khoản giáo viên!");
  window.location.href = "login.html";
}

if (currentUser.role !== "teacher") {
  alert("Chỉ giáo viên mới được sử dụng!");
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

// ===== RENDER =====
async function renderStudents() {
  const list = document.getElementById("studentList");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  let count = 0;

  querySnapshot.forEach((docSnap) => {
    const s = docSnap.data();
    const id = docSnap.id;
    count++;

    list.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.class}</td>
        <td>${s.email}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${id}')">Xóa</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = count;
}

// ===== THÊM =====
window.addStudent = async function () {
  const name = prompt("Nhập tên học sinh:");
  if (!name) return;

  const className = prompt("Nhập lớp:");
  if (!className) return;

  const email = prompt("Nhập email:");
  if (!email) return;

  await addDoc(collection(db, "students"), {
    name,
    class: className,
    email
  });

  renderStudents();
};
// ===== XÓA =====
window.deleteStudent = async function (id) {
  if (confirm("Bạn có chắc muốn xóa không?")) {
    await deleteDoc(doc(db, "students", id));
    renderStudents();
  }
};

// ===== LOAD =====
renderStudents();
</script>

</script>

</body>
