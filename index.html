<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lí học sinh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Student Manager</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Trang chủ</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Học sinh</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Điểm</a>
        </li>
      </ul>

      <div>
        <button class="btn btn-success me-2" onclick="window.location.href='login.html'">Đăng nhập</button>
        <button class="btn btn-danger" onclick="window.location.href='register.html'">Đăng ký</button>
      </div>
    </div>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="container mt-4">

  <h3 class="mb-4">📊 Dashboard</h3>

  <div class="row text-center">
    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Tổng học sinh</h5>
          <h2 id="total">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Học sinh giỏi</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow">
        <div class="card-body">
          <h5>Trung bình lớp</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>
  </div>

  <!-- DANH SÁCH HỌC SINH -->
  <div class="card mt-4 shadow">
    <div class="card-body">
      <div class="d-flex justify-content-between mb-3">
        <h5>Danh sách học sinh</h5>
        <button class="btn btn-primary" onclick="addStudent()">+ Thêm</button>
      </div>

      <table class="table table-bordered text-center">
        <thead class="table-dark">
          <tr>
            <th>Tên</th>
            <th>Lớp</th>
            <th>Email</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="studentList">
          <!-- JS thêm dữ liệu -->
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 CONFIG CỦA BẠN
const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};
    const nav = document.getElementById("navMenu");
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (user) {
        nav.innerHTML = `
      <span style="color:white">👋 Xin chào, ${user.username}</span>
      <a href="#" id="logoutBtn">Đăng xuất</a>
    `;
        document.getElementById("logoutBtn").onclick = () => {
          localStorage.removeItem("currentUser");
          location.reload();
        };
      } else {
        nav.innerHTML = `
      <a href="login.html">Đăng nhập</a>
      <a href="register.html">Đăng ký</a>
    `;
      }
</script>

</body>
</html>
