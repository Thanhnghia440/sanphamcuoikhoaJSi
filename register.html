<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Student Manager</a>

    <div class="ms-auto">
      <button class="btn btn-success me-2" onclick="location.href='login.html'">Đăng nhập</button>
      <button class="btn btn-danger">Đăng ký</button>
    </div>
  </div>
</nav>

<!-- FORM -->
<div class="d-flex justify-content-center align-items-center" style="height:85vh;">
  <div class="card p-4 shadow" style="width:400px;">
    
    <h3 class="text-center mb-3">Tạo tài khoản</h3>

    <input id="name" class="form-control mb-2" placeholder="Họ và tên">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Mật khẩu">
    <input id="confirm" type="password" class="form-control mb-3" placeholder="Xác nhận mật khẩu">

    <button class="btn btn-danger w-100 mb-2" onclick="register()">Đăng ký</button>

    <small class="text-center">
      Đã có tài khoản? 
      <a href="login.html">Đăng nhập</a>
    </small>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};

// Bắt sự kiện submit form đăng ký
const form = document.querySelector("form");

form.addEventListener("submit", function (e) {
  e.preventDefault(); // Ngăn reload trang

  // Lấy dữ liệu người dùng nhập
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // Validate dữ liệu
  if (username.length < 6) {
    alert("Username tối thiểu 6 ký tự");
    return;
  }

  if (password.length < 8) {
    alert("Mật khẩu tối thiểu 8 ký tự");
    return;
  }

  // Lấy danh sách user từ localStorage
  let users = JSON.parse(localStorage.getItem("users")) || [];

  // Kiểm tra trùng username hoặc email
  const isExist = users.find(
    (u) => u.username === username || u.email === email
  );

  if (isExist) {
    alert("User hoặc Email đã tồn tại");
    return;
  }

  // Lưu user mới
  users.push({ username, email, password });
  localStorage.setItem("users", JSON.stringify(users));

  alert("Đăng ký thành công!");
  window.location.href = "login.html";
});
</script>

</body>
</html>
