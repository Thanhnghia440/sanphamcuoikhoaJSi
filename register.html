<!-- FORM -->
<div class="d-flex justify-content-center align-items-center" style="height:85vh;">
<form class="card p-4 shadow" style="width:400px;">
    
    <h3 class="text-center mb-3">Tạo tài khoản</h3>

   <input id="username" class="form-control mb-2" placeholder="Họ và tên">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Mật khẩu">
    <input id="confirm" type="password" class="form-control mb-3" placeholder="Xác nhận mật khẩu">

    <button class="btn btn-danger w-100 mb-2" onclick="register()">Đăng ký</button>

    <small class="text-center">
      Đã có tài khoản? 
      <a href="login.html">Đăng nhập</a>
    </small>

  </div>
</div>
</form>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBh-wCR02v7WDHbFyiOdbauRi0pUUZ25Q",
  authDomain: "finaljsi-7d280.firebaseapp.com",
  projectId: "finaljsi-7d280",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// global
window.db = db;
window.fb = { collection, addDoc, getDocs };

// Lấy form
const form = document.querySelector("form");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirm = document.getElementById("confirm").value.trim();

  // Validate
  if (username.length < 3) {
    alert("Tên phải ít nhất 3 ký tự");
    return;
  }

  if (password.length < 6) {
    alert("Mật khẩu ít nhất 6 ký tự");
    return;
  }

  if (password !== confirm) {
    alert("Mật khẩu không khớp");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const isExist = users.find(
    (u) => u.username === username || u.email === email
  );

  if (isExist) {
    alert("Tài khoản hoặc email đã tồn tại");
    return;
  }

  // ===== LƯU LOCAL =====
  const newUser = {
    username,
    email,
    password,
    role: "teacher"
  };

  users.push(newUser);
  localStorage.setItem("users", JSON.stringify(users));

  // ===== LƯU FIREBASE =====
  const querySnapshot = await fb.getDocs(fb.collection(db, "users"));

  let exists = false;

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    if (data.username === username || data.email === email) {
      exists = true;
    }
  });

  if (!exists) {
    await fb.addDoc(fb.collection(db, "users"), {
      username,
      email,
      role: "teacher"
    });
  }

  alert("Đăng ký giáo viên thành công!");
  window.location.href = "login.html";
});
</script>
</body>
</html>
